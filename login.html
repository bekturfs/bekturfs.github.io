<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/media.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="header-container">
        <nav class="site-navigation">
          <div class="hamburger-menu">
            <div class="bar1"></div>
            <div class="invis"></div>
            <div class="bar3"></div>
          </div>
          <a href="" class="main-logo">
            <img src="img/skynance-logo.png" alt="main-log" />
          </a>
          <ul class="nav-list">
            <li class="nav-item">
              <a class="nav-link" href="#">Как это работает</a>
            </li>
            <li class="nav-item"><a class="nav-link" href="#">Партнерам</a></li>
            <li class="nav-item nav-item-documents"><a class="nav-link" href="#">Документы</a></li>

              <a class="nav-link" href="#">Вход/Регистрация</a>
            </li>
          </ul>
          <div class="hidden-element"></div>
        </nav>
      </div>
    </header>
    <section class="login">
      <form action="">
        <h1 class="login__title">Войти</h1>
        <div class="login__container">
          <input
            type="text"
            class="login-or-email"
            placeholder="Введите логин или Email"
          />
          <input
            type="password"
            class="password"
            placeholder="Введите пароль"
          />
          <a href="#" class="forgot__password">(Забыли пароль?)</a>
        </div>
        <button class="red-btn login-btn">Войти</button>
      </form>
    </section>
    <footer class="main-footer">
      <div class="main-container">
        <div class="footer-content">
          <ul class="footer-content__menu">
            <li class="footer-content__menu-item">
              <a href="#">Как это работает</a>
            </li>
            <li class="footer-content__menu-item"><a href="#">Партнерам</a></li>
            <li class="footer-content__menu-item"><a href="#">О нас</a></li>
          </ul>
          <a href="" class="footer-content__logo">
            <img src="img/skynance-logo.png" alt="Skynance Logo" />
          </a>
          <ul class="footer-content__contacts">
            <li class="footer-content__contacts-item">
              <a href="tel:+996 (555) 354 354">+996 (555) 354 354</a>
            </li>
            <li class="footer-content__contacts-item">
              <a href="tel:+996 (555) 354 354">+996 (555) 354 354</a>
            </li>
          </ul>
