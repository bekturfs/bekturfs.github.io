<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Профиль</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/media.css" />
  </head>
  <body>
    <header class="main-header main-header-authenticated">
      <div class="header-container">
        <nav class="site-navigation">
          <div class="hamburger-menu">
            <div class="bar1"></div>
            <div class="invis"></div>
            <div class="bar3"></div>
          </div>
          <a href="" class="main-logo">
            <img src="img/skynance-logo.png" alt="main-log" />
          </a>
          <ul class="nav-list">
            <li class="nav-item nav-item-profile-photo">
              <img src="img/profile-photo.png" alt="" srcset="">
            </li>
            <!-- add link-active class for current page -->
            <li class="nav-item link-active">
              <a class="nav-link" href="#">Мой профиль</a>
            </li>
            <li class="nav-item"><a class="nav-link" href="#">Мои заявки</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Служба поддержки</a></li>
            <li class="nav-item nav-item-btn">
              <a class="nav-link" href="#">Выйти</a>
            </li>
          </ul>
          <div class="hidden-element"></div>
        </nav>
      </div>
    </header>
    <section class="profile">
      <h1 class="profile__title">Мой профиль</h1>
      <h2 class="profile__title2">Редактирование</h2>
      <form action="" class="profile-edit__form" method="GET">
        <div class="white-container-big mb-0 mt-0">
          <div class="profile__content profile__content-edit">
            <div class="profile__img">
              <label for="profile-photo"></label>
              <input
                id="profile-photo"
                type="file"
                class="hidden-input"
                required
              />
              <img src="img/profile-photo.png" alt="Фото профиля" />
            </div>
            <div class="profile__row">
              <div class="profile__col profile__name">
                <label for="lastname">Фамилия</label>
                <input type="text" id="lastname" placeholder="Doe" required />
              </div>
              <div class="application__date profile__date-birth profile__col">
                <label for="birth-date">Дата рождения</label>
                <input
                  value="1991-01-01"
                  type="date"
                  id="birth-date"
                  class="profile__date-input"
                  required
                />
              </div>
            </div>
            <div class="profile__row">
              <div class="profile__col profile__name">
                <label for="firstname">Имя</label>
                <input type="text" id="firstname" placeholder="John" required />
              </div>
              <div class="profile__col profile__name">
                <label for="email">Email</label>
                <input
                  type="text"
                  id="email"
                  placeholder="johndoe@mail.com"
                  required
                />
              </div>
            </div>
            <div class="profile__row">
              <div class="profile__col profile__name">
                <label for="patronymic">Отчество</label>
                <input
                  type="text"
                  id="patronymic"
                  placeholder="Отчество"
                  required
                />
              </div>
              <div class="profile__col profile__name">
                <label for="number-of-phone">Номер телефона</label>
                <input
                  type="text"
                  id="number-of-phone"
                  placeholder="+996 *** ******"
                  required
                />
              </div>
            </div>
            <div class="profile__row">
              <div class="profile__col profile__name">
                <label for="password1">Пароль</label>
                <input
                  type="text"
                  id="password1"
                  placeholder="******"
                  required
                />
              </div>
              <div class="profile__col profile__name">
                <label for="password2">Потверждение пароля</label>
                <input
                  type="text"
                  id="password2"
                  placeholder="******"
                  required
                />
              </div>
            </div>
            <h2 class="profile__sub-title">Паспортные данные</h2>
            <div class="profile__row">
              <div class="profile__col profile__name">
                <label for="seria-of-passport">Серия паспорта</label>
                <input
                  type="text"
                  id="seria-of-passport"
                  placeholder="серия паспорта"
                  required
                />
              </div>
              <div class="profile__col profile__name">
                <label for="issued-by">Кем выдан</label>
                <input
                  type="text"
                  id="issued-by"
                  placeholder="кем выдан"
                  required
                />
              </div>
            </div>
            <div class="profile__row">
              <div
                class="application__date application__inputs profile__date-birth profile__col"
              >
                <label for="issued-time">Когда выдан</label>
                <input
                  value="2010-01-01"
                  type="date"
                  id="issued-time"
                  class="profile__date-input"
                  required
                />
              </div>
              <div class="profile__col border-none"></div>
            </div>
            <h3 class="profile__passport-photo-subtitle">
              Фото паспорта (с двух сторон)
            </h3>
            <div class="profile__row">
              <div class="profile__col">
                <div class="profile__passport-photo-inputs">
                  <label class="photo-label"
                    >Фото паспорта
                    <input type="file" class="photo-input" required />
                  </label>
                  <label class="photo-camera-label">
                    <input
                      type="file"
                      class="photo-camera-input"
                      accept="image/*"
                      capture
                      required
                    />
                  </label>
                </div>
              </div>
              <div class="profile__col">
                <div class="profile__passport-photo-inputs">
                  <label class="photo-label"
                    >Фото паспорта
                    <input type="file" class="photo-input" required />
                  </label>
                  <label class="photo-camera-label">
                    <input
                      type="file"
                      class="photo-camera-input"
                      accept="image/*"
                      capture
                      required
                    />
                  </label>
                </div>
              </div>
            </div>
          </div>
        </div>
        <button type="submit" class="red-btn profile-edit__button">
          Сохранить
        </button>
      </form>
    </section>
    <footer class="main-footer">
      <div class="main-container">
        <div class="footer-content">
          <ul class="footer-content__menu">
            <li class="footer-content__menu-item">
              <a href="#">Как это работает</a>
            </li>
            <li class="footer-content__menu-item"><a href="#">Партнерам</a></li>
            <li class="footer-content__menu-item"><a href="#">О нас</a></li>
          </ul>
          <a href="" class="footer-content__logo">
            <img src="img/skynance-logo.png" alt="Skynance Logo" />
          </a>
          <ul class="footer-content__contacts">
            <li class="footer-content__contacts-item">
              <a href="tel:+996555354354">+996 (555) 354 354</a>
            </li>
            <li class="footer-content__contacts-item">
              <a href="tel:+996555354354">+996 (555) 354 354</a>
            </li>
          </ul>
        </div>
      </div>
    </footer>
    <script src="js/header.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
