    <section class="profile registration">
        <h1 class="profile__title">
            Регистрация
        </h1>
        <h2 class="profile__title2">
            Личные данные
        </h2>
      <form action="index.php" class="profile-edit__form" method="POST">
        <div class="white-container-big mb-0 mt-0">
          <div class="profile__content profile__content-edit">
            <div class="profile__img">
              <input id="profile-photo" accept="image/*" type="file" required>
              <label for="profile-photo"></label>
              <img src="img/icons/photo-plus-icon.png" id="profile__upload-img" alt="Фото профиля">
            </div>
            <div class="profile__row">
              <div class="profile__col profile__name">
                <label for="lastname">Фамилия</label>
                <input type="text" id="lastname" class="profile__input" placeholder="Doe" required/>
              </div>
              <div class="profile__date profile__col">
                <label for="birth-date">Дата рождения</label>
                <input value="1991-01-01" type="date" id="birth-date" class="profile__date-input" required/>
              </div>
            </div>
            <div class="profile__row">
              <div class="profile__col profile__name">
                <label for="firstname">Имя</label>
                <input type="text" id="firstname" class="profile__input" placeholder="John" required/>
              </div>
              <div class="profile__col profile__name">
                <label for="email">Email</label>
                <input type="email" id="email" class="profile__input" placeholder="johndoe@mail.com" required/>
              </div>
            </div>
            <div class="profile__row">
              <div class="profile__col profile__name">
                <label for="patronymic">Отчество</label>
                <input type="text" id="patronymic" class="profile__input" placeholder="Отчество" required/>
              </div>
              <div class="profile__col profile__name">
                <label for="number-of-phone">Номер телефона</label>
                <input type="tel" id="number-of-phone" class="profile__input" pattern="[+]{1}[0-9]{12}||[0-9]{10}" placeholder="+996 *** ******" required/>
              </div>
            </div>
            <div class="profile__row">
              <div class="profile__col profile__name">
                <label for="password1">Пароль</label>
                <input type="text" id="password1" class="profile__input" placeholder="******" required/>
              </div>
              <div class="profile__col profile__name">
                <label for="password2">Потверждение пароля</label>
                <input type="text" id="password2" class="profile__input" placeholder="******" required/>
              </div>
            </div>
            <h2 class="profile__sub-title">Паспортные данные</h2>
            <div class="profile__row">
              <div class="profile__col profile__name">
                <label for="seria-of-passport">Серия паспорта</label>
                <input type="text" id="seria-of-passport" class="profile__input" placeholder="серия паспорта" required/>
              </div>
              <div class="profile__col profile__name">
                <label for="issued-by">Кем выдан</label>
                <input type="text" id="issued-by" class="profile__input" placeholder="кем выдан" required/>
              </div>
            </div>
            <div class="profile__row">
              <div class="profile__date profile__col">
                <label for="birth-date">Когда выдан</label>
                <input value="2010-01-01" type="date" id="birth-date" required/>
              </div>
              <div class="profile__col border-none"></div>
            </div>
            <h3 class="profile__passport-photo-subtitle">
              Фото паспорта (с двух сторон)
            </h3>
            <div class="profile__row">
              <div class="profile__col">
                <div class="profile__passport-photo-inputs">
                  <input type="file" id="photo-input1" class="photo-input" required/>
                  <label for="photo-input1" class="photo-label">Фото паспорта</label>
                  <label for="photo-input1" class="photo-camera-label"></label>
                </div>
              </div>
              <div class="profile__col">
                <div class="profile__passport-photo-inputs">
                  <input type="file" id="photo-input2" class="photo-input" required/>
                  <label for="photo-input2" class="photo-label">Фото паспорта</label>
                  <label for="photo-input2" class="photo-camera-label"></label>
                </div>
              </div>
            </div>
          </div>
        </div>
        <button type="submit" class="red-btn profile-edit__button">Зарегистрироваться</button>
      </form>
